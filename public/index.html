    <!-- Security: Frame-busting script (Clickjacking Protection) -->
    <script>
      if (top !== self) {
        top.location = self.location;
      }

    <!-- Additional Security Headers (backup for older browsers) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <!-- Cache Control for sensitive pages -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Shorthand Online</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Security: Show page if not in frame (Clickjacking Protection) -->
    <script>
      // Enhanced frame-busting protection
      (function() {
        if (self === top) {
          document.documentElement.style.display = 'block';
        } else {
          // Multiple attempts to break out of frames
          try {
            if (top.location.hostname !== self.location.hostname) {
              top.location = self.location;
            }
          } catch (e) {
            top.location = self.location;
          }
        }
        
        // Additional protection against nested frames
        if (window.parent && window.parent !== window) {
          try {
            if (window.parent.location.hostname !== window.location.hostname) {
              window.parent.location = window.location;
            }
          } catch (e) {
            window.parent.location = window.location;
          }
        }
        
        // Production security measures
        if (window.location.hostname === 'www.shorthandonlineexam.in' || 
            window.location.hostname === 'shorthandonlineexam.in') {
          // Clear console in production
          if (typeof console !== 'undefined') {
            console.clear();
            // Disable console methods in production
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
            console.info = function() {};
            console.debug = function() {};
          }
          
          // Disable right-click and common developer shortcuts
          // document.addEventListener('contextmenu', function(e) {
          //   e.preventDefault();
          //   return false;
          // });
          
          document.addEventListener('keydown', function(e) {
            // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if (e.keyCode === 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                (e.ctrlKey && e.keyCode === 85)) {
              e.preventDefault();
              return false;
            }
          });
        }
      })();
    </script>
  </body>
